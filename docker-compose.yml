services:
  app:
    build: .
    image: dugate:latest
    ports:
      - "2023:2023"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://dugate:${DB_PASSWORD}@db:5432/dugate}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:2023}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      MIGRATION: ${MIGRATION:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MOCK_SERVICE_URL: ${MOCK_SERVICE_URL:-http://mock-service:3099}
      SEED: true
      SEED_ADMIN_KEY: ${SEED_ADMIN_KEY}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    #ports:
    #  - "5432:5432"
    environment:
      POSTGRES_USER: dugate
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: dugate
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dugate"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mock-service:
    build: ./mock-service
    ports:
      - "3099:3099"
    environment:
      MOCK_PORT: 3099
      MOCK_API_KEY: DUMMY_SECRET_KEY
      MOCK_DELAY_MS: 300
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    #ports:
    #  - "6379:6379"
    # Dev: in-memory mode (no persistence). Production: add --appendonly yes + volume
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  worker:
    build: . # Reuse same Dockerfile as Next.js app
    image: dugate:latest
    command: ["node", "worker.js"] # Pre-compiled bundle — no tsx needed at runtime
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://dugate:${DB_PASSWORD}@db:5432/dugate}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MOCK_SERVICE_URL: ${MOCK_SERVICE_URL:-http://mock-service:3099}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      SUBSTEP_WORKER_CONCURRENCY: ${SUBSTEP_WORKER_CONCURRENCY:-10}
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f worker.ts || pgrep -f worker.js || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  pgdata:
